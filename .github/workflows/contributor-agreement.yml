name: DevDrop Contribution Archive

on:
  push:
    branches:
      - main

  pull_request:
    types:
      - closed

jobs:
  archive:
    if: github.event_name == 'push' || github.event.pull_request.merged == true

    runs-on: ubuntu-latest

    steps:
      - name: Checkout archive repository
        uses: actions/checkout@v4
        with:
          repository: ProgramerXYZ/DevDrop-Contribution-Archive
          token: ${{ secrets.ARCHIVE_TOKEN }}
          path: archive

      - name: Save metadata
        run: |
          mkdir -p archive/$(date +%Y-%m-%d_%H-%M-%S)

          cat <<EOF > archive/$(date +%Y-%m-%d_%H-%M-%S)/metadata.json
          {
            "repository": "${{ github.repository }}",
            "branch": "${{ github.ref_name }}",
            "actor": "${{ github.actor }}",
            "event": "${{ github.event_name }}",
            "commit": "${{ github.sha }}",
            "timestamp": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          }
          EOF

      - name: Save patch
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p archive/pr-${{ github.event.pull_request.number }}

          curl -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.patch" \
            "${{ github.event.pull_request.patch_url }}" \
            > archive/pr-${{ github.event.pull_request.number }}/changes.patch

      - name: Commit archive
        run: |
          cd archive

          git config user.name "DevDrop Archive Bot"
          git config user.email "archive-bot@devdrop.local"

          git add .

          git commit -m "Archive ${{ github.event_name }} by ${{ github.actor }}" || echo "Nothing to commit"

          git push