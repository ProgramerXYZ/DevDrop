name: Contributor Agreement Check

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

jobs:
  contributor-agreement:
    runs-on: ubuntu-latest

    steps:
      - name: Check contributor agreement acceptance
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";

            const accepted =
              body.includes("- [x] I agree to the Contributor Agreement.") ||
              body.includes("- [X] I agree to the Contributor Agreement.");

            if (!accepted) {
              core.setFailed(`
              Pull request rejected.

              The contributor must explicitly agree to the terms contained in
              CONTRIBUTOR_AGREEMENT.md before this pull request can be merged.

              Please check the following box in the pull request description:

              - [x] I agree to the Contributor Agreement.
              `);
            }

      - name: Checkout archive repository
        uses: actions/checkout@v4
        with:
          repository: ProgramerXYZ/DevDrop-Contribution-Archive
          token: ${{ secrets.ARCHIVE_TOKEN }}
          path: archive

      - name: Save Pull Request patch
        run: |
          mkdir -p archive/${{ github.event.pull_request.user.login }}

          curl \
            -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.patch" \
            "${{ github.event.pull_request.patch_url }}" \
            > archive/${{ github.event.pull_request.user.login }}/PR-${{ github.event.pull_request.number }}.patch

      - name: Save metadata
        run: |
          cat <<EOF > archive/${{ github.event.pull_request.user.login }}/metadata.json
          {
            "user": "${{ github.event.pull_request.user.login }}",
            "pull_request": "${{ github.event.pull_request.number }}",
            "commit_sha": "${{ github.sha }}",
            "accepted_agreement": true,
            "timestamp": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          }
          EOF

      - name: Commit archive
        run: |
          cd archive

          git config user.name "DevDrop Archive Bot"
          git config user.email "archive-bot@devdrop.local"

          git add .

          git commit -m "Archive PR #${{ github.event.pull_request.number }} from ${{ github.event.pull_request.user.login }}" || echo "Nothing to commit"

          git push
