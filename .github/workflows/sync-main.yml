name: Sync main into branches

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --all

          for branch in $(git for-each-ref --format='%(refname:short)' refs/remotes/origin/ | sed 's|origin/||'); do

            # Skip main and HEAD
            if [[ "$branch" == "main" || "$branch" == "HEAD" ]]; then
              continue
            fi

            echo "Syncing $branch..."

            git checkout -B "$branch" "origin/$branch"

            if git merge origin/main --no-edit; then
              git push origin "$branch"
              echo "✅ Synced $branch"

            else
              echo "❌ Merge conflict in $branch"

              git merge --abort || true

              gh issue create \
                --title "Merge conflict: main → $branch" \
                --label "merge-conflict" \
                --body "
## 🚨 Automatic Merge Conflict

GitHub Actions could not merge **main** into **$branch**.

### Branch
\`$branch\`

### Main Commit
\`${GITHUB_SHA}\`

### Workflow
${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

### Please
- [ ] Merge \`main\` into your branch.
- [ ] Resolve the conflicts.
- [ ] Push the updated branch.
- [ ] Close this issue once done.
"

            fi

          done
